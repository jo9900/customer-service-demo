<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Service Demo</title>
  <style>
    #app *,
    #app {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .easemobim-minimized {
      z-index: 99999 !important;
      display: block !important;
    }

    div.easemobim-iframe-shadow {
      z-index: 99998 !important;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1a73e8;
    }

    .navbar .nav-links {
      display: flex;
      gap: 28px;
    }

    .navbar .nav-links a {
      text-decoration: none;
      color: #555;
      font-size: 15px;
      transition: color 0.2s;
    }

    .navbar .nav-links a:hover {
      color: #1a73e8;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 20px;
      color: #1a1a1a;
      font-weight: 800;
    }

    .hero p {
      font-size: 17px;
      color: #666;
      max-width: 580px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero .btn {
      display: inline-block;
      padding: 14px 36px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .hero .btn:hover {
      background: #1557b0;
      transform: translateY(-1px);
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 60px 40px;
      background: #fff;
      flex-wrap: wrap;
    }

    .card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 36px 28px;
      width: 300px;
      text-align: center;
      border: 1px solid #e8ecf1;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .card .icon {
      font-size: 40px;
      margin-bottom: 18px;
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #1a1a1a;
      font-weight: 700;
    }

    .card p {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      padding: 28px;
      color: #999;
      font-size: 13px;
      border-top: 1px solid #eee;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="logo">Demo Store</div>
      <div class="nav-links">
        <a href="#">首页</a>
        <a href="#">产品</a>
        <a href="#">关于我们</a>
        <a href="#">联系我们</a>
      </div>
    </nav>

    <section class="hero">
      <h1>欢迎来到 Demo Store</h1>
      <p>这是一个用于测试右下角客服系统的演示页面。点击右下角的客服图标即可开始对话。</p>
      <a href="#" class="btn">了解更多</a>
    </section>

    <section class="features">
      <div class="card">
        <div class="icon">💬</div>
        <h3>在线客服</h3>
        <p>右下角即可看到客服入口，点击即可实时沟通。</p>
      </div>
      <div class="card">
        <div class="icon">⚡</div>
        <h3>快速响应</h3>
        <p>客服团队随时在线，为您提供及时帮助。</p>
      </div>
      <div class="card">
        <div class="icon">🔒</div>
        <h3>安全可靠</h3>
        <p>对话内容加密传输，保障您的隐私安全。</p>
      </div>
    </section>

    <footer class="footer">
      &copy; 2026 Demo Store. All rights reserved.
    </footer>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({}).mount('#app');
  </script>

  <!-- Customer service widget -->
  <script src="//agent.zenava.ai/webim/easemob.js?configId=fc1642a6-d982-4ebe-9811-e84735701324&language=zh-CN"></script>
</body>
</html>
